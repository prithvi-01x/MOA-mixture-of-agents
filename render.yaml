services:
  - type: web
    name: moa-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: DB_PATH
        value: /data/moa.db
      - key: CONFIG_PATH
        value: /data/config.json
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://moa-frontend.onrender.com
      - key: LOG_FORMAT
        value: json
    disk:
      name: moa-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: moa-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://moa-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://moa-backend.onrender.com