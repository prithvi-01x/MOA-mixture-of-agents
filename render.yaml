services:
  - type: web
    name: moa-backend
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: DB_PATH
        value: /tmp/moa.db
      - key: CONFIG_PATH
        value: /tmp/config.json
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://moa-frontend.onrender.com
      - key: LOG_FORMAT
        value: json

  - type: web
    name: moa-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://moa-backend.onrender.com